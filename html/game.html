<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Eco Sort — Сортуй сміття правильно!</title>
  <link rel="stylesheet" href="../css/game.css">
</head>
<body>

<header>
  <div class="header-top">
      <div class="score-box">
        Бали: <span id="score">0</span>
      </div>

      <h1>♻️ Eco Sort — Сортуй сміття правильно!</h1>
  </div>

  <p>Перетягни предмет у правильний контейнер і врятуй планету 🌍</p>
</header>

<main>
  <div class="bins">
    <div class="bin" id="plastic">
      <img src="../images/PLASTIC.png" alt="Пластик">
      <p>Пластик</p>
    </div>

    <div class="bin" id="glass">
      <img src="../images/GlassTrash.png" alt="Скло">
      <p>Скло</p>
    </div>

    <div class="bin" id="metall">
      <img src="../images/METAL.png" alt="Метал">
      <p>Метал</p>
    </div>

    <div class="bin" id="organic">
      <img src="../images/ORGANIC.png" alt="Органіка">
      <p>Органіка</p>
    </div>

    <div class="bin" id="battery">
      <img src="../images/BATTERY.png" alt="Батарейки">
      <p>Батарейки</p>
    </div>

    <div class="bin" id="electronic">
      <img src="../images/E-WASTE.png" alt="Електроніка">
      <p>Електроніка</p>
    </div>
  </div>

  <div class="trash-grid" id="trashGrid">
    <img src="../images/GLASS.png" class="trash" draggable="true" data-type="glass">
    <img src="../images/Battery2.png" class="trash" draggable="true" data-type="battery">
    <img src="../images/Bottle.png" class="trash" draggable="true" data-type="plastic">
    <img src="../images/screw.png" class="trash" draggable="true" data-type="metall">
    <img src="../images/Bottle2.png" class="trash" draggable="true" data-type="glass">
    <img src="../images/sheet.png" class="trash" draggable="true" data-type="metall">
    <img src="../images/Banana.png" class="trash" draggable="true" data-type="organic">
    <img src="../images/bag.png" class="trash" draggable="true" data-type="plastic">
    <img src="../images/chip.png" class="trash" draggable="true" data-type="electronic">
    <img src="../images/Apple.png" class="trash" draggable="true" data-type="organic">
    <img src="../images/mouse.png" class="trash" draggable="true" data-type="electronic">
    <img src="../images/Battery1.png" class="trash" draggable="true" data-type="battery">
  </div>

  <!-- ФІНАЛЬНЕ ПОВІДОМЛЕННЯ -->
  <div id="praiseBox" style="
    display: none;
    margin: 30px auto 0;
    padding: 22px;
    max-width: 520px;
    text-align: center;
    background: #e8f5e9;
    border: 3px solid #1b5e20;
    border-radius: 18px;
    font-size: 1.25rem;
    font-weight: bold;
    color: #1b5e20;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  ">
    🌟 Ти впорався! Молодець!  
    <br>
    💚 Ти правильно відсортував усе сміття та допоміг планеті!
  </div>

</main>

<footer>
  <a href="../index.html">← Назад до сторінок</a>
</footer>

<script src="../javascript/game.js"></script>

<script>
  const trashGrid = document.getElementById("trashGrid");
  const praiseBox = document.getElementById("praiseBox");

  const praiseMessages = [
    "🌟 Ти впорався! Молодець! Ти справжній еко-герой!",
    "👏 Чудова робота! Планета дякує тобі!",
    "💚 Молодчинка! Ти допоміг зберегти природу!",
    "♻️ Супер! Ти правильно відсортував усе сміття!",
    "🌍 Відмінно! Завдяки тобі Земля стала чистішою!",
    "🏆 Браво! Ти знаєш, як берегти довкілля!"
  ];

  function showRandomPraise() {
    const randomIndex = Math.floor(Math.random() * praiseMessages.length);
    praiseBox.innerHTML = praiseMessages[randomIndex];
    praiseBox.style.display = "block";
  }

  const observer = new MutationObserver(() => {
    const remainingTrash = trashGrid.querySelectorAll(".trash").length;

    if (remainingTrash === 0) {
      showRandomPraise();
    }
  });

  observer.observe(trashGrid, {
    childList: true
  });
</script>


</body>
</html>

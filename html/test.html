<html lang="uk">

<title>Тест — EcoFuture</title>
<link rel="stylesheet" href="../css/index.css">

<style>
body{
min-height:100vh;
display:flex;
flex-direction:column;
}

main{
flex:1;
}

.test-layout{
display:grid;
grid-template-columns:260px 1fr;
gap:24px;
}

.sidebar{
background:var(--card);
border-radius:var(--radius);
padding:18px;
box-shadow:var(--shadow);
}

.topic-btnn{
width:100%;
margin:6px 0;
padding:12px;
border:none;
border-radius:var(--radius);
background:#e8f5e9;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

.topic-btnn:hover{
background:#a5d6a7;
transform:translateY(-2px);
}

.test-area{
background:var(--card);
border-radius:var(--radius);
padding:30px;
box-shadow:var(--shadow);
min-height:420px;
}

.start-wrapper{
text-align:center;
margin:30px 0;
}

.start-btn{
padding:14px 28px;
border:none;
border-radius:var(--radius);
background:#66bb6a;
color:white;
font-size:18px;
cursor:pointer;
transition:.25s;
}

.start-btn:hover{
transform:scale(1.06);
box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.answer{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:var(--radius);
background:#e8f5e9;
cursor:pointer;
font-size:15px;
transition:.2s;
}

.answer:hover{
background:#a5d6a7;
transform:translateX(4px);
}

.fade{
animation:fadeIn .35s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(8px);}
to{opacity:1; transform:translateY(0);}
}

#result{
font-size:24px;
font-weight:bold;
text-align:center;
margin-top:20px;
}

@media(max-width:768px){
.test-layout{grid-template-columns:1fr;}
}
</style>

</head>

let quiz=[];
let current=0;
let score=0;

const titleEl=document.getElementById("testTitle");
const startBtn=document.getElementById("startBtn");
const progressEl=document.getElementById("progress");
const questionEl=document.getElementById("question");
const answersEl=document.getElementById("answers");
const resultEl=document.getElementById("result");

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function setTopic(topic){
quiz=shuffle([...questionBank[topic]]);
titleEl.textContent="Тема обрана";
startBtn.style.display="inline-block";
resetView();
}

function resetView(){
progressEl.textContent="";
questionEl.textContent="";
answersEl.innerHTML="";
resultEl.textContent="";
}

function startTest(){
current=0;
score=0;
startBtn.style.display="none";
showQuestion();
}

function showQuestion(){

const q=quiz[current];

progressEl.textContent=`Питання ${current+1} з ${quiz.length}`;
questionEl.textContent=q.q;
questionEl.className="fade";

answersEl.innerHTML="";

let answers=q.a.map((text,i)=>({text:text,correct:i===q.correct}));

answers=shuffle(answers);

answers.forEach(ans=>{
const btn=document.createElement("button");
btn.className="answer fade";
btn.textContent=ans.text;

btn.onclick=()=>{
if(ans.correct) score++;

current++;

if(current<quiz.length){
setTimeout(showQuestion,200);
}else{
showResult();
}
};

answersEl.appendChild(btn);
});
}

function showResult(){

questionEl.textContent="";
answersEl.innerHTML="";
progressEl.textContent="Тест завершено";

let msg="";
if(score>=Math.ceil(quiz.length*0.8)) msg="🔥 Відмінно!";
else if(score>=Math.ceil(quiz.length*0.5)) msg="👍 Добре!";
else msg="📚 Варто повторити";

resultEl.textContent=`Твій результат: ${score} / ${quiz.length} — ${msg}`;
}

</script>
